services:
  mcp:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HWP_API_URL=http://api:8000
      - MCP_HTTP_PORT=3000
    networks:
      - hwpconvermd_default
    depends_on:
      - api

  api:
    build: ../hwpConverMd
    ports:
      - "8000:8000"
    volumes:
      - ../hwpConverMd:/app
      - ../hwpConverMd/temp:/app/temp
      - ../hwpConverMd/output:/app/output
    environment:
      - ENV=development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - hwpconvermd_default

networks:
  hwpconvermd_default:
    driver: bridge
