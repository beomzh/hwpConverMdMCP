apiVersion: v1
kind: ResourceQuota
metadata:
  name: hwp-converter-quota
  namespace: hwp-converter
  labels:
    app.kubernetes.io/part-of: hwp-converter
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "1Gi"
    limits.cpu: "2"
    limits.memory: "2Gi"
    pods: "10"
    services: "5"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hwp-converter-limits
  namespace: hwp-converter
  labels:
    app.kubernetes.io/part-of: hwp-converter
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "1"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
